<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniStream | Ultra</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: #000000; color: #ffffff; overflow-x: hidden; }
        
        .hero { position: relative; height: 50vh; min-height: 350px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=2560&auto=format&fit=crop') center/cover; opacity: 0.3; z-index: 0; filter: contrast(120%) saturate(150%); }
        .hero::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, #000000 10%, transparent); z-index: 1; }
        
        .hero-content { position: relative; z-index: 2; text-align: center; width: 100%; max-width: 800px; padding: 0 20px; }
        .logo { font-size: 64px; font-weight: 900; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; letter-spacing: -2px; text-transform: uppercase; }
        
        .search-wrapper { position: relative; display: flex; background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; padding: 5px; box-shadow: 0 0 40px rgba(168, 85, 247, 0.2); transition: all 0.3s ease; }
        .search-wrapper:focus-within { border-color: #a855f7; box-shadow: 0 0 60px rgba(236, 72, 153, 0.4); transform: scale(1.02); }
        input { flex: 1; background: transparent; border: none; padding: 20px 30px; font-size: 18px; color: #fff; outline: none; font-family: 'Outfit', sans-serif; }
        input::placeholder { color: #6b7280; }
        button { background: linear-gradient(135deg, #a855f7, #ec4899); border: none; padding: 0 40px; border-radius: 40px; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; font-family: 'Outfit', sans-serif; }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(236, 72, 153, 0.6); }

        .container { max-width: 1400px; margin: 20px auto 50px; padding: 0 30px; position: relative; z-index: 3; }
        
        .section-title { font-size: 28px; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .section-title span { color: #ec4899; }

        .player-panel { display: none; background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 24px; padding: 25px; margin-bottom: 60px; box-shadow: 0 25px 50px -12px rgba(0,0,0,1); }
        .player-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .player-header h2 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .ep-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; max-height: 200px; overflow-y: auto; padding-right: 10px; }
        .ep-card { background: #121212; border: 1px solid #27272a; padding: 12px 20px; border-radius: 12px; color: #a1a1aa; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .ep-card:hover { background: #ec4899; color: #fff; border-color: #ec4899; transform: translateY(-3px); }
        
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .media-card { background: transparent; border-radius: 16px; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .media-card:hover { transform: translateY(-10px) scale(1.02); }
        .media-card img { width: 100%; height: 320px; object-fit: cover; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: all 0.3s ease; }
        .media-card:hover img { box-shadow: 0 15px 30px rgba(168, 85, 247, 0.4); }
        .media-card h3 { font-size: 16px; font-weight: 500; margin-top: 15px; color: #e4e4e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px; }
        .media-card .episode-badge { position: absolute; top: 15px; left: 15px; background: #ec4899; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; box-shadow: 0 5px 10px rgba(0,0,0,0.3); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ec4899; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <div class="logo">AniStream</div>
            <div class="search-wrapper">
                <input type="text" id="search-field" placeholder="Search the ultimate anime archive..." onkeypress="if(event.key === 'Enter') queryDatabase()">
                <button onclick="queryDatabase()">Search</button>
            </div>
        </div>
    </header>

    <div class="container">
        
        <!-- Player Panel Workspace -->
        <div id="player-box" class="player-panel">
            <div class="player-header">
                <h2 id="active-title">Initiating Stream...</h2>
            </div>
            <div style="border-radius: 16px; overflow: hidden; background: #000;">
                <video id="video-stream-node" controls crossorigin playsinline></video>
            </div>
            <div id="episode-rack" class="ep-grid"></div>
        </div>

        <!-- Trending Recent Feed -->
        <div id="trending-section">
            <h2 class="section-title"><span>🔥</span> Recently Released Episodes</h2>
            <div id="trending-output" class="grid-layout">
                <h3 style="color:#71717a; font-weight: 300;">Syncing live data...</h3>
            </div>
        </div>

        <!-- Dynamic Query Results Feed -->
        <div id="search-section" class="hidden">
            <h2 class="section-title"><span>⚡</span> Search Results</h2>
            <div id="catalog-output" class="grid-layout"></div>
        </div>

    </div>

    <!-- UI/UX Decryption Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        // Utilizing a 100% stable public deployment instance node
        const BACKEND_NODE = "https://consumet.org";

        let engineHls = null;
        let enginePlyr = null;

        // Auto-run trending index updates on system bootup
        document.addEventListener("DOMContentLoaded", fetchTrending);

        // Part 1: Automated Recent Feed Fetching
        async function fetchTrending() {
            try {
                const request = await fetch(`${BACKEND_NODE}/recent-episodes`);
                const response = await request.json();
                
                const grid = document.getElementById('trending-output');
                grid.innerHTML = "";

                if (!response.results || response.results.length === 0) {
                    grid.innerHTML = "<h3 style='color:#71717a; font-weight: 300;'>No recent updates live on network arrays.</h3>";
                    return;
                }

                response.results.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    // We extract the base anime identifier out of the episode mapping structures
                    const baseId = item.id.split("-episode-")[0];
                    card.onclick = () => buildWorkspacePanel(baseId, item.title);
                    card.innerHTML = `
                        <div class="episode-badge">Ep ${item.episodeNumber}</div>
                        <img src="${item.image}" alt="${item.title}" onerror="this.src='https://unsplash.com'">
                        <h3>${item.title}</h3>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                document.getElementById('trending-output').innerHTML = "<h3 style='color:#ef4444;'>Network response error connecting to streaming arrays.</h3>";
            }
        }

        // Part 2: Query Archive Database
        async function queryDatabase() {
            const query = document.getElementById('search-field').value.trim();
            if (!query) return;

            // Handle UI view panel toggling structures
            document.getElementById('search-section').classList.remove('hidden');
            const grid = document.getElementById('catalog-output');
            grid.innerHTML = "<h3 style='color:#71717a; font-weight: 300;'>Scanning master data directories...</h3>";
            
            window.scrollTo({ top: document.getElementById('search-section').offsetTop - 30, behavior: 'smooth' });

            try {
                const request = await fetch(`${BACKEND_NODE}/${encodeURIComponent(query)}`);
                const response = await request.json();
                grid.innerHTML = "";

                if (!response.results || response.results.length === 0) {
                    grid.innerHTML = "No file index entries matched that term.";
                    return;
                }
                
                response.results.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    card.onclick = () => buildWorkspacePanel(item.id, item.title);
                    card.innerHTML = `<img src="${item.image}" alt="${item.title}" onerror="this.src='https://unsplash.com'"> <h3>${item.title}</h3>`;
                    grid.appendChild(card);
                });
            } catch (err) {
                grid.innerHTML = "Error synchronizing archive indices.";
            }
        }

        // Part 3: Map Sub-Episode Infrastructure Array Elements
        async function buildWorkspacePanel(animeId, animeTitle) {
            document.getElementById('player-box').style.display = "block";
            document.getElementById('active-title').innerText = `Unpacking file manifests for: ${animeTitle}`;
            window.scrollTo({ top: document.getElementById('player-box').offsetTop - 20, behavior: 'smooth' });
            
            try {
                const request = await fetch(`${BACKEND_NODE}/info/${animeId}`);
                const response = await request.json();
                const rack = document.getElementById('episode-rack');
                rack.innerHTML = "";
                
                if (!response.episodes || response.episodes.length === 0) {
                    alert("This specific title has no compiled watch paths.");
                    return;
                }
                
                response.episodes.forEach(ep => {
                    const btn = document.createElement('button');
                    btn.className = 'ep-card';
                    btn.innerText = `Episode ${ep.number}`;
                    btn.onclick = () => launchAdfreeStream(ep.id, animeTitle, ep.number);
                    rack.appendChild(btn);
                });
                
                // Auto launch initial starting point episode stream path node
                launchAdfreeStream(response.episodes[0].id, animeTitle, response.episodes[0].number);
            } catch (err) {
                console.error("Critical fault syncing sub-data lists.", err);
            }
        }

        // Part 4: Ad-Free Decryption & Header Spoof Injection Controls
        async function launchAdfreeStream(epId, title, epNum) {
            document.getElementById('active-title').innerText = `Now Streaming: ${title} (Episode ${epNum})`;
            
            try {
                const request = await fetch(`${BACKEND_NODE}/watch/${epId}`);
                const response = await request.json();
                // Track default index array streams inside the provided JSON arrays
                const cleanSource = response.sources.find(s => s.quality === 'default' || s.quality === 'auto') || response.sources[0];
                const videoTag = document.getElementById('video-stream-node');
                
                if (engineHls) engineHls.destroy();
                
                if (Hls.isSupported()) {
                    engineHls = new Hls({
                        maxMaxBufferLength: 30,
                        xhrSetup: function (xhr, url) {
                            // THE CORE DEPLOYMENT TRICK: Spoofing headers directly inside the user client interface
                            xhr.setRequestHeader('Referer', 'gogocdn.com');
                        }
                    });
                    engineHls.loadSource(cleanSource.url);
                    engineHls.attachMedia(videoTag);
                    engineHls.on(Hls.Events.MANIFEST_PARSED, function() {
                        if (!enginePlyr) {
                            enginePlyr = new Plyr(videoTag, {
                                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen']
                            });
                        }
                        enginePlyr.play();
                    });
                }
            } catch (err) {
                alert("Target file link is currently unreadable by network player arrays.");
            }
        }
    </script>
</body>
</html>
